<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMDR BLS</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #info {
      position: absolute; top: 14px; width: 100%;
      text-align: center; color: #fff;
      font-family: Arial, sans-serif; font-size: 13px;
      pointer-events: none;
    }

    /* מסך הזדהות PIN — חוסם את החוויה עד שמתחברים לחדר של מטפל/ת ספציפי/ת */
    #pinScreen {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: #0a1622;
      font-family: Arial, sans-serif; direction: rtl;
    }
    #pinScreen.hidden { display: none; }
    #pinCard {
      width: min(86vw, 360px);
      background: #11222e; border: 1px solid #ffffff1a; border-radius: 20px;
      padding: 32px 28px; text-align: center; color: #fff;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    #pinCard h1 { margin: 0 0 6px; font-size: 20px; font-weight: 700; }
    #pinCard p { margin: 0 0 22px; font-size: 13px; color: #9bb4c0; line-height: 1.5; }
    #pinInput {
      width: 100%; box-sizing: border-box; text-align: center;
      font-size: 28px; font-weight: 700; letter-spacing: 8px;
      padding: 14px 0; border-radius: 12px; border: 1px solid #ffffff2a;
      background: #0a1622; color: #fff; margin-bottom: 14px;
    }
    #pinInput:focus { outline: none; border-color: #22d3ee; }
    #pinSubmit {
      width: 100%; padding: 14px 0; border-radius: 12px; border: none;
      background: #0891b2; color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer;
    }
    #pinSubmit:disabled { opacity: 0.5; cursor: default; }
    #pinError { margin-top: 12px; font-size: 13px; color: #f87171; min-height: 16px; }

    /* קישור עדין להחלפת חדר (גלוי רק לאחר התחברות) */
    #changeRoom {
      position: fixed; bottom: 10px; inset-inline-end: 12px; z-index: 40;
      font-family: Arial, sans-serif; font-size: 11px; color: rgba(255,255,255,0.35);
      cursor: pointer; user-select: none;
    }
    #changeRoom.hidden { display: none; }
  </style>
</head>
<body>
  <div id="info">EMDR BLS | לחץ "Enter VR"</div>

  <div id="pinScreen">
    <div id="pinCard">
      <h1>EMDR BLS</h1>
      <p>הזן/י את קוד ה-PIN בן 4 הספרות המוצג בדשבורד של המטפל/ת כדי להתחבר לחדר.</p>
      <input id="pinInput" type="tel" inputmode="numeric" maxlength="4" placeholder="0000" autocomplete="off">
      <button id="pinSubmit" type="button">התחברות</button>
      <div id="pinError"></div>
    </div>
  </div>
  <div id="changeRoom" class="hidden">החלפת קוד PIN</div>

  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    // ══════════════════════════════════════════
    //  Firebase — כתובת בסיס הנתונים
    // ══════════════════════════════════════════
    const DB = 'https://emdr-bls-b9cd1-default-rtdb.firebaseio.com';

    // ══════════════════════════════════════════
    //  מצב מרכזי — מתעדכן מהדשבורד דרך Firebase
    // ══════════════════════════════════════════
    const S = {
      running:    true,
      speed:      5,            // 1–9
      swing:      5,            // 1–9 רוחב תנועה
      height:     0,            // -5 עד +5
      size:       5,            // 1–9
      color:      '#5599ff',
      pattern:    'horizontal', // 'horizontal' | 'figure8'
      visual:     true,
      audio:      true,
      audioVolume: 5,           // 1–9 עוצמת צליל ה-BLS (טק)
      haptic:     true,
      hapticStrength: 5,        // 1–9 עוצמת הרטט
      env:        'sky',        // סביבת רקע
      music:      'off',        // 'off' | '1' | '2' | '3'
      musicVolume: 5,           // 0–9
      hapticOnly: false,
      iwText:     '',           // טקסט שזירה להצגה למטופל ('' = ללא)
      iwSeq:      0,            // משתנה בכל שליחה/הסתרה → מפעיל פייד-אין/אאוט
      sessionSeq: 0,            // משתנה באיפוס → מאפס פאזה/חזרות
      setSeq:     0,            // משתנה בכל פליי → מאפס פאזה/חזרות (סט חדש)
    };

    // המרת סקאלות לערכים פיזיקליים
    const toSpeed  = l => 0.2  + (l - 1) * 0.150;
    const toSwing  = l => 0.30 + (l - 1) * 0.175;
    const toHeight = h => h * 0.10;
    const toScale  = l => 0.40 + (l - 1) * 0.150;

    // ══════════════════════════════════════════
    //  Three.js
    // ══════════════════════════════════════════
    const scene    = new THREE.Scene();
    const camera   = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ antialias: true });

    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.xr.enabled = true;
    renderer.xr.setReferenceSpaceType('local'); // 0 = גובה עיניים
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(VRButton.createButton(renderer));

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const sun = new THREE.DirectionalLight(0xffffff, 1.1);
    sun.position.set(2, 4, 3);
    scene.add(sun);

    // ══════════════════════════════════════════
    //  סביבת רקע — ספֵרה הפוכה ענקית עם מעבר-גוון
    //  (מחולל בקוד, ללא קבצים כבדים)
    // ══════════════════════════════════════════
    const ENVIRONMENTS = {
      room:    { top: '#d9c9b0', bottom: '#8a7355', clear: 0xb9a685 }, // חדר רגוע
      nature:  { top: '#9fd4e8', bottom: '#5a8f4e', clear: 0x86b97a }, // נוף טבע
      beach:   { top: '#aee4f0', bottom: '#e8d6a8', clear: 0xbfe0e6 }, // חוף ים
      sky:     { top: '#3a7bd5', bottom: '#bfe3ff', clear: 0x87CEEB }, // שמיים
      neutral: { top: '#5a5a66', bottom: '#23232b', clear: 0x33333b }, // ניטרלי
    };

    // יוצר טקסטורת מעבר-גוון אנכי על canvas
    function makeGradientTexture(top, bottom) {
      const c = document.createElement('canvas');
      c.width = 16; c.height = 256;
      const g = c.getContext('2d');
      const grad = g.createLinearGradient(0, 0, 0, 256);
      grad.addColorStop(0, top);
      grad.addColorStop(1, bottom);
      g.fillStyle = grad;
      g.fillRect(0, 0, 16, 256);
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // ספֵרה הפוכה שעוטפת את המטופל (BackSide = רואים אותה מבפנים)
    const skyMat  = new THREE.MeshBasicMaterial({ side: THREE.BackSide });
    const skyDome = new THREE.Mesh(new THREE.SphereGeometry(30, 64, 32), skyMat);
    scene.add(skyDome);

    // רקעי תמונה 360 — נטענים מתיקיית backgrounds/ (כל ערך env שאינו גוון)
    const texLoader  = new THREE.TextureLoader();
    const photoCache = {};       // id → THREE.Texture (נטען פעם אחת בלבד)
    let   currentEnv = null;     // הרקע המוצג כעת — מונע טעינה חוזרת בכל עדכון

    function setGradient(e) {
      if (skyMat.map && skyMat.map.isCanvasTexture) skyMat.map.dispose();
      skyMat.map = makeGradientTexture(e.top, e.bottom);
      skyMat.needsUpdate = true;
      renderer.setClearColor(e.clear);
    }

    function applyEnv(name) {
      if (name === currentEnv) return;     // אין שינוי אמיתי → לא טוענים שוב
      currentEnv = name;
      // גוון מחולל-בקוד
      if (ENVIRONMENTS[name]) { setGradient(ENVIRONMENTS[name]); return; }
      // רקע תמונה — מהמטמון אם כבר נטען
      if (photoCache[name]) {
        skyMat.map = photoCache[name]; skyMat.needsUpdate = true;
        renderer.setClearColor(0x000000);
        return;
      }
      // טעינה ראשונה (אסינכרונית)
      texLoader.load(`backgrounds/${name}.jpg`, tex => {
        tex.colorSpace = THREE.SRGBColorSpace;
        photoCache[name] = tex;
        if (currentEnv === name) {          // עדיין הרקע הנבחר?
          skyMat.map = tex; skyMat.needsUpdate = true;
          renderer.setClearColor(0x000000);
        }
      }, undefined, () => { setGradient(ENVIRONMENTS.neutral); currentEnv = null; });
    }
    applyEnv(S.env);

    // ══════════════════════════════════════════
    //  כדור — ערכי יעד + מעבר חלק (lerp)
    // ══════════════════════════════════════════
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 32, 32),
      new THREE.MeshStandardMaterial({ color: S.color, roughness: 0.4, metalness: 0.1 })
    );
    sphere.position.set(0, toHeight(S.height), -1.5);
    sphere.scale.setScalar(toScale(S.size));
    scene.add(sphere);

    // ערכי יעד שאליהם הכדור "זוחל" בעדינות
    const target = {
      scale:  toScale(S.size),
      posY:   toHeight(S.height),
      color:  new THREE.Color(S.color),
    };

    // ══════════════════════════════════════════
    //  אודיו — "טק" קצר בכל קצה
    // ══════════════════════════════════════════
    let audioCtx = null;
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playTick(side) {
      if (!audioCtx || !S.running || !S.audio) return;
      const peak = (S.audioVolume / 9) * 0.9;   // 1–9 → עוצמה
      if (peak < 0.005) return;                 // ווליום 0 → שקט
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const panner = new StereoPannerNode(audioCtx, { pan: side === 'right' ? 1 : -1 });
      osc.type = 'sine';
      osc.frequency.value = 440;
      const t = audioCtx.currentTime;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(peak, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      osc.connect(panner); panner.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + 0.13);
    }

    // ══════════════════════════════════════════
    //  מוזיקת רקע — קובץ מתיקיית music/
    // ══════════════════════════════════════════
    let musicEl = null;     // ה-<audio> הנוכחי
    let musicId = 'off';    // איזו רצועה נטענה

    function applyMusic() {
      // עצירה אם כובה או שונתה הבחירה
      if (S.music === 'off' || S.music !== musicId) {
        if (musicEl) { musicEl.pause(); musicEl = null; }
        musicId = 'off';
      }
      // ווליום (0–9 → 0.0–1.0)
      const vol = Math.max(0, Math.min(1, S.musicVolume / 9));
      // טעינה והפעלה של רצועה נבחרת
      if (S.music !== 'off' && S.music !== musicId) {
        musicEl = new Audio(`music/${S.music}.mp3`);
        musicEl.loop = true;
        musicEl.volume = vol;
        musicEl.play().catch(() => {}); // קובץ חסר / חסימת autoplay → מתעלמים
        musicId = S.music;
      }
      if (musicEl) musicEl.volume = vol;
    }

    // הפעלת אודיו דורשת תנועת משתמש
    function resumeAudio() {
      if (!audioCtx) initAudio();
      else if (audioCtx.state === 'suspended') audioCtx.resume();
      applyMusic();
    }
    document.addEventListener('click', resumeAudio);
    renderer.xr.addEventListener('sessionstart', resumeAudio);

    // ══════════════════════════════════════════
    //  רטט מתחלף
    // ══════════════════════════════════════════
    function pulseHaptic(side) {
      if (!S.haptic) return;
      const session = renderer.xr.getSession();
      if (!session) return;
      for (const src of session.inputSources) {
        if (src.handedness === side && src.gamepad?.hapticActuators?.length > 0) {
          const strength = Math.max(0.1, Math.min(1, S.hapticStrength / 9));
          src.gamepad.hapticActuators[0].pulse(strength, 150);
        }
      }
    }

    // ══════════════════════════════════════════
    //  שזירות — לוח טקסט צף (CanvasTexture)
    //  נכנס בפייד-אין, מוחזק לפי אורך הטקסט, יוצא בפייד-אאוט.
    //  ממוקם מעל מסלול הכדור כדי לא להסתיר אותו.
    // ══════════════════════════════════════════
    const iw = {
      seq: 0,          // ה-iwSeq האחרון שטופל
      synced: false,   // האם סונכרן מול המצב הראשון מ-Firebase (מונע הקפצת טקסט ישן בריענון)
      opacity: 0,      // שקיפות נוכחית (מונפשת)
      target: 0,       // יעד השקיפות (0 או 1)
      hideAt: 0,       // חותמת-זמן (ms) להיעלמות אוטומטית; 0 = ללא
      mesh: null, canvas: null, ctx: null, tex: null,
    };

    // מלבן מעוגל-פינות (עם נפילה חיננית לדפדפנים ישנים)
    function roundRect(ctx, x, y, w, h, r) {
      if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); return; }
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function buildInterweave() {
      const canvas = document.createElement('canvas');
      canvas.width = 1024; canvas.height = 512;
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      const mat = new THREE.MeshBasicMaterial({
        map: tex, transparent: true, opacity: 0,
        depthWrite: false, depthTest: false, // תמיד נקרא מעל הרקע
      });
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.8), mat);
      mesh.position.set(0, 0.78, -2.0);  // מעל הכדור (y≈0, z=-1.5) ומעט מאחוריו
      mesh.renderOrder = 10;
      mesh.visible = false;
      scene.add(mesh);
      iw.canvas = canvas; iw.ctx = canvas.getContext('2d'); iw.tex = tex; iw.mesh = mesh;
    }
    buildInterweave();

    // מצייר את הטקסט על ה-canvas (גלישת שורות + פאנל רקע שקוף-למחצה)
    function drawInterweaveText(text) {
      const ctx = iw.ctx, W = iw.canvas.width, H = iw.canvas.height;
      ctx.clearRect(0, 0, W, H);
      const fontSize = 64;
      ctx.font = `700 ${fontSize}px Arial, sans-serif`;
      ctx.direction = 'rtl';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // גלישת שורות לפי רוחב מרבי
      const maxWidth = W - 140;
      const words = text.split(/\s+/);
      const lines = [];
      let line = '';
      for (const w of words) {
        const test = line ? line + ' ' + w : w;
        if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
        else line = test;
      }
      if (line) lines.push(line);

      const lineH = fontSize * 1.32;
      const blockH = lines.length * lineH;
      let maxLineW = 0;
      lines.forEach(l => maxLineW = Math.max(maxLineW, ctx.measureText(l).width));

      // פאנל רקע שקוף-למחצה בגודל הטקסט
      const padX = 64, padY = 44;
      const panelW = Math.min(W, maxLineW + padX * 2);
      const panelH = blockH + padY * 2;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      roundRect(ctx, (W - panelW) / 2, (H - panelH) / 2, panelW, panelH, 40);
      ctx.fill();

      // הטקסט עצמו — לבן עם צל לקריאוּת מול כל רקע
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = 'rgba(0,0,0,0.85)';
      ctx.shadowBlur = 10;
      let y = H / 2 - blockH / 2 + lineH / 2;
      for (const l of lines) { ctx.fillText(l, W / 2, y); y += lineH; }
      ctx.shadowBlur = 0;

      iw.tex.needsUpdate = true;
    }

    // מגיב לשינוי iwSeq: טקסט חדש → הצגה; טקסט ריק → הסתרה
    function applyInterweave() {
      if (!iw.synced) { iw.synced = true; iw.seq = S.iwSeq; return; } // ריענון מאמצע סשן לא מקפיץ טקסט ישן
      if (S.iwSeq === iw.seq) return;
      iw.seq = S.iwSeq;
      const txt = (S.iwText || '').trim();
      if (txt) {
        drawInterweaveText(txt);
        iw.mesh.visible = true;
        iw.target = 1;
        // משך החזקה גדל עם אורך הטקסט (זמן קריאה), בתוספת פייד-אין
        const hold = Math.min(14000, 3500 + txt.length * 130);
        iw.hideAt = performance.now() + 1200 + hold;
      } else {
        iw.target = 0;     // פקודת הסתרה ידנית
        iw.hideAt = 0;
      }
    }

    // ══════════════════════════════════════════
    //  Firebase ← מאזין לפקודות מהדשבורד
    //  נתיב ספציפי-לחדר (sessions/{roomId}) — roomId מתקבל ממסך ה-PIN למטה.
    //  הארכיטקטורה הישנה השתמשה בנתיב גלובלי יחיד (emdr.json); כעת כל מטפל/ת
    //  מקבל/ת חדר נפרד, בדיוק כמו שהדשבורד החדש כותב אליו.
    // ══════════════════════════════════════════
    let lastSessionSeq = S.sessionSeq;
    let lastSetSeq = S.setSeq;
    let roomId = null;
    let fbStream = null;
    let statusTimer = null;
    let phase = 0;   // פאזת התנועה — צוברת לאורך זמן (פתרון הקפיצה)
    let reps  = 0;   // מונה חזרות (מחזורים מלאים) — מוצב כאן (לא בלולאת האנימציה) כי
                     // reportStatus() עליו נסמך עלול לרוץ באופן סינכרוני כבר מההתחברות
                     // האוטומטית (localStorage) למעלה, לפני שהקוד מגיע ללולאת האנימציה.

    function connectFirebase(id) {
      if (fbStream) fbStream.close();
      fbStream = new EventSource(`${DB}/sessions/${id}.json`);
      fbStream.addEventListener('put', e => {
        const { data } = JSON.parse(e.data);
        if (!data) return;
        Object.assign(S, data);
        applyAll();
      });
      fbStream.addEventListener('error', () => { /* יתחבר מחדש אוטומטית */ });
    }

    // מחיל את כל הפרמטרים אחרי עדכון מהדשבורד
    function applyAll() {
      target.scale = toScale(S.size);
      target.posY  = toHeight(S.height);
      target.color.set(S.color);
      sphere.visible = S.visual;
      applyEnv(S.env);
      applyMusic();
      applyInterweave();
      // איפוס סשן (כפתור איפוס) או תחילת סט חדש (פליי) → מאפס פאזה וחזרות
      if (S.sessionSeq !== lastSessionSeq || S.setSeq !== lastSetSeq) {
        lastSessionSeq = S.sessionSeq;
        lastSetSeq = S.setSeq;
        phase = 0; reps = 0;
      }
    }

    // ══════════════════════════════════════════
    //  Firebase → דיווח סטטוס (נוכחות + חזרות) — לפי roomId
    // ══════════════════════════════════════════
    function reportStatus() {
      if (!roomId) return;
      fetch(`${DB}/status/${roomId}.json`, {
        method: 'PUT',
        body: JSON.stringify({ alive: Date.now(), reps, running: S.running }),
        headers: { 'Content-Type': 'application/json' },
      }).catch(() => {});
    }

    // ══════════════════════════════════════════
    //  הזדהות PIN — פותר קוד PIN ל-roomId דרך pins/{pin}, ונזכר ב-localStorage
    //  כדי שהקסדה תתחבר אוטומטית לאותו חדר בפעמים הבאות (אותו מטפל/ת, אותה קסדה).
    // ══════════════════════════════════════════
    const ROOM_STORAGE_KEY = 'emdrBlsRoomId';

    const pinScreen   = document.getElementById('pinScreen');
    const pinInput    = document.getElementById('pinInput');
    const pinSubmit   = document.getElementById('pinSubmit');
    const pinErrorEl  = document.getElementById('pinError');
    const changeRoomEl = document.getElementById('changeRoom');

    function startSession(id) {
      roomId = id;
      localStorage.setItem(ROOM_STORAGE_KEY, id);
      pinScreen.classList.add('hidden');
      changeRoomEl.classList.remove('hidden');
      connectFirebase(id);
      reportStatus();
      if (statusTimer) clearInterval(statusTimer);
      statusTimer = setInterval(reportStatus, 1000); // heartbeat כל שנייה
    }

    async function resolveRoomId(pin) {
      const res = await fetch(`${DB}/pins/${pin}.json`);
      return res.json(); // roomId (string) או null אם הקוד לא קיים
    }

    async function submitPin() {
      const pin = pinInput.value.trim();
      if (!/^\d{4}$/.test(pin)) {
        pinErrorEl.textContent = 'יש להזין קוד בן 4 ספרות.';
        return;
      }
      pinSubmit.disabled = true;
      pinErrorEl.textContent = '';
      try {
        const id = await resolveRoomId(pin);
        if (!id) {
          pinErrorEl.textContent = 'קוד לא נמצא. בדוק/י מול המטפל/ת ונסה/י שוב.';
          return;
        }
        startSession(id);
      } catch {
        pinErrorEl.textContent = 'תקלת תקשורת. נסה/י שוב.';
      } finally {
        pinSubmit.disabled = false;
      }
    }

    pinSubmit.addEventListener('click', submitPin);
    pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitPin(); });
    pinInput.addEventListener('input', () => {
      pinInput.value = pinInput.value.replace(/\D/g, '').slice(0, 4);
    });
    changeRoomEl.addEventListener('click', () => {
      localStorage.removeItem(ROOM_STORAGE_KEY);
      location.reload();
    });

    // חיבור אוטומטי אם כבר נשמר roomId ממפגש קודם באותה קסדה
    const savedRoomId = localStorage.getItem(ROOM_STORAGE_KEY);
    if (savedRoomId) startSession(savedRoomId);
    else pinInput.focus();

    // ══════════════════════════════════════════
    //  קונטרולרים (בקאפ ללא דשבורד)
    // ══════════════════════════════════════════
    [renderer.xr.getController(0), renderer.xr.getController(1)].forEach(ctrl => {
      ctrl.addEventListener('selectstart', () => { S.running = !S.running; });
      scene.add(ctrl);
    });

    // ══════════════════════════════════════════
    //  לולאת אנימציה
    // ══════════════════════════════════════════
    const clock = new THREE.Clock();
    let prevA = false, prevB = false;
    let hapticR = false, hapticL = false;

    renderer.setAnimationLoop(() => {
      const dt = clock.getDelta();

      // כפתורי A/B — שינוי מהירות (בקאפ ללא דשבורד)
      const session = renderer.xr.getSession();
      if (session) {
        for (const src of session.inputSources) {
          const gp = src.gamepad; if (!gp) continue;
          const aNow = gp.buttons[4]?.pressed ?? false;
          const bNow = gp.buttons[5]?.pressed ?? false;
          if (aNow && !prevA) S.speed = Math.min(9, S.speed + 1);
          if (bNow && !prevB) S.speed = Math.max(1, S.speed - 1);
          prevA = aNow; prevB = bNow;
        }
      }

      // מעבר חלק של גודל/גובה/צבע אל ערכי היעד
      const k = 1 - Math.pow(0.001, dt); // lerp עצמאי-קצב-פריימים
      sphere.scale.setScalar(THREE.MathUtils.lerp(sphere.scale.x, target.scale, k));
      sphere.position.y = THREE.MathUtils.lerp(sphere.position.y, target.posY, k);
      sphere.material.color.lerp(target.color, k);

      // פייד חלק של לוח השזירה (כניסה/יציאה) — בלתי תלוי בתנועת הכדור
      if (iw.mesh) {
        if (iw.hideAt && performance.now() >= iw.hideAt) { iw.target = 0; iw.hideAt = 0; }
        const fadeK = 1 - Math.pow(0.06, dt);   // ~1.2ש' לפייד מלא
        iw.opacity = THREE.MathUtils.lerp(iw.opacity, iw.target, fadeK);
        iw.mesh.material.opacity = iw.opacity;
        if (iw.target === 0 && iw.opacity < 0.01) iw.mesh.visible = false;
      }

      if (S.running) {
        const swing = toSwing(S.swing);

        // צבירת פאזה — שינוי מהירות משנה קצב, לא מיקום (אין קפיצה)
        const prevPhase = phase;
        phase += dt * toSpeed(S.speed) * Math.PI;

        // ספירת חזרות — כל מחזור מלא (2π) = חזרה אחת
        reps = Math.floor(phase / (Math.PI * 2));

        // מיקום לפי תבנית התנועה
        const x = Math.sin(phase) * swing;
        sphere.position.x = x;
        if (S.pattern === 'figure8') {
          // שמינייה: תנודת Y בתדר כפול סביב הגובה הנוכחי
          sphere.position.y = target.posY + Math.sin(phase * 2) * (swing * 0.4);
        }

        // טריגר אודיו + רטט בקצוות ה-X
        const zone = swing * 0.80;
        if (x > zone && !hapticR) {
          hapticR = true; hapticL = false;
          pulseHaptic('right'); playTick('right');
        } else if (x < -zone && !hapticL) {
          hapticL = true; hapticR = false;
          pulseHaptic('left'); playTick('left');
        }
      } else {
        // עצירה / סיום סט — מחזירים את הכדור בעדינות למרכז (X) במקום להשאיר אותו קפוא בצד
        sphere.position.x = THREE.MathUtils.lerp(sphere.position.x, 0, k);
        hapticR = false; hapticL = false; // הסט הבא יתחיל נקי מאזורי הטריגר
      }

      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

  </script>
</body>
</html>
